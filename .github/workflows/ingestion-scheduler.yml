name: Daily Data Ingestion Scheduler

on:
  schedule:
    # Runs at 04:30 UTC daily, which corresponds to 10:00 AM IST.
    - cron: '30 4 * * *'
  workflow_dispatch: # Allows manual triggering from the GitHub Actions UI

permissions:
  contents: write # Needed to commit and push changes back to the repo

jobs:
  ingest-mutual-fund-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Trigger Remote Data Ingestion
        run: |
          # The backend URL must be stored as a GitHub Secret
          # We use curl to ping the endpoint, telling the live server to update its own persistent disk.
          echo "Pinging the live server to trigger ingestion..."
          curl -X POST "${{ secrets.RAILWAY_API_URL }}/trigger-ingestion"
