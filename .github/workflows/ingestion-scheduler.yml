name: Daily Data Ingestion Scheduler

on:
  schedule:
    # Runs at 04:30 UTC daily, which corresponds to 10:00 AM IST.
    - cron: '30 4 * * *'
  workflow_dispatch: # Allows manual triggering from the GitHub Actions UI

permissions:
  contents: write # Needed to commit and push changes back to the repo

jobs:
  ingest-mutual-fund-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Data Ingestion Pipeline
        env:
          # If the ingestion script requires the Groq API key for any reason, it will be injected here.
          # You must configure this in your GitHub Repository Settings -> Secrets and variables -> Actions
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          # Navigate to src and execute the ingestion pipeline
          cd src
          python ingestion.py
      
      - name: Commit and Push Updated Vector DB
        run: |
          # Configure git identity
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stage the ChromaDB folder
          git add chroma_db/
          
          # Only commit if there are changes generated by the ingestion script
          if git diff --staged --quiet; then
            echo "No new data to commit. The vector DB is already up to date."
          else
            git commit -m "chore: automated daily ingestion update (10:00 AM IST)"
            git push
          fi
